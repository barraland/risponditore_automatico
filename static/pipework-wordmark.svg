<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C6F432"></stop>
      <stop offset="100%" stop-color="#6EE7FF"></stop>
    </linearGradient>
    <linearGradient id="gtext" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C6F432"></stop>
      <stop offset="100%" stop-color="#6EE7FF"></stop>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>
  </defs>

  
  <g transform="translate(48,48)">
    <rect x="0" y="0" width="224" height="224" rx="64" ry="64" fill="none" stroke="url(#g)" stroke-width="14"></rect>
    <circle cx="64" cy="64" r="18" fill="#C6F432" filter="url(#glow)"></circle>
    <circle cx="160" cy="160" r="18" fill="#6EE7FF" filter="url(#glow)"></circle>
    <path d="M64 64 C64 160, 160 64, 160 160" stroke="url(#g)" stroke-width="14" fill="none" stroke-linecap="round"></path>
  </g>

  
  <text x="340" y="212" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="184" font-weight="700" letter-spacing="-6" fill="url(#gtext)">Pipework</text>
</svg>