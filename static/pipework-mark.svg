    </filter>
  </defs>

  
  <rect x="16" y="16" width="224" height="224" rx="64" ry="64" fill="none" stroke="url(#g)" stroke-width="14"></rect>

  
  <circle cx="80" cy="80" r="18" fill="#C6F432" filter="url(#glow)"></circle>
  <circle cx="176" cy="176" r="18" fill="#6EE7FF" filter="url(#glow)"></circle>

  
  <path d="M80 80 C80 176, 176 80, 176 176" stroke="url(#g)" stroke-width="14" fill="none" stroke-linecap="round"></path>
