services:
  # ---------- Applicazione FastAPI (assistente condominio) ----------
  app:
    # NB: usa l'immagine già pronta (caricata con `docker load`), NON ricostruisce nulla
    image: risponditore-automatico-app:latest
    container_name: automatico-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_HOST: "0.0.0.0"
      APP_PORT: "9999"
      # DB SQLite e documenti caricati: persistiti sul volume ./data
      DATABASE_URL: "sqlite:////app/data/assistente.db"
      DOCUMENTI_DIR: "/app/data/documenti"
    volumes:
      - ./data:/app/data
    ports:
      - "9999:9999"

  # ---------- Tunnel ngrok (rende l'endpoint raggiungibile da WhatsApp / Twilio) ----------
  ngrok:
    image: ngrok/ngrok:latest
    container_name: automatico-ngrok
    restart: unless-stopped
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    command: http app:9999
    # Per URL fisso (consigliato): imposta NGROK_DOMAIN nel .env, commenta la riga
    # "command" sopra e usa questa:
    # command: http --url=${NGROK_DOMAIN} app:9999
    ports:
      - "4040:4040"
    depends_on:
      - app
