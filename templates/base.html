<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Dashboard{% endblock %} - {{ studio.nome if studio else "Amministrazione Condomini" }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/static/style.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">
                <i class="bi bi-buildings"></i> {{ studio.nome if studio else "Amministrazione Condomini" }}
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link {% if request.url.path == '/' or '/condomini' in request.url.path %}active{% endif %}" href="/">
                            <i class="bi bi-buildings"></i> Condomìni
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if '/ticket' in request.url.path %}active{% endif %}" href="/ticket">
                            <i class="bi bi-ticket-detailed"></i> Ticket
                            <span id="nav-ticket-badge" class="badge bg-danger d-none">0</span>
                        </a>
                    </li>
                </ul>
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link {% if '/impostazioni' in request.url.path %}active{% endif %}" href="/impostazioni" title="Impostazioni tecniche">
                            <i class="bi bi-gear-fill"></i>
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container-fluid py-4">
        {% block content %}{% endblock %}
    </main>

    <footer class="text-center text-muted py-3 border-top">
        <small>Centralino AI Condomìni &copy; 2026</small>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    // Badge ticket aperti in navbar (aggiornato all'apertura della pagina).
    fetch('/ticket/count').then(r => r.json()).then(d => {
        const b = document.getElementById('nav-ticket-badge');
        if (b && d.aperti > 0) { b.textContent = d.aperti; b.classList.remove('d-none'); }
    }).catch(() => {});
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
